<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script>
        /* ============================================================
           BLOQUE DE CONFIGURACIÓN - EDITA TODO AQUÍ ABAJO
           ============================================================ */
        
        const CONFIG = {
            // 1. TEXTOS PRINCIPALES
            nombre_bebe: "Sofía Valentina",
            frase_biblica: "En tus manos, Señor, pongo mi vida y mi camino.",
            texto_invitacion: "Queremos compartir la alegría del bautizo de nuestra pequeña. Tu presencia es nuestro mejor regalo.",
            
            // 2. FAMILIA (Nombres)
            papas: "Roberto & Lucía",
            padrinos: "Carlos & Elena",

            // 3. LOGÍSTICA (Nombres y Horas)
            iglesia_nombre: "Parroquia de San Juan Bautista",
            iglesia_hora: "12:00 PM",
            iglesia_fecha: "24 de Octubre de 2026",
            
            salon_nombre: "Quinta Las Palmas",
            salon_hora: "02:30 PM",
            
            // 4. ENLACES (URLs)
            mapa_iglesia: "https://www.google.com/maps/place/Cd.+de+M%C3%A9xico/@19.3202008,-99.4822761,10z/data=!3m1!4b1!4m6!3m5!1s0x85ce0036b1352927:0xdefd9e4ee8d18a5b!8m2!3d19.2464696!4d-99.1013498!16s%2Fg%2F1220wgqb?entry=ttu&g_ep=EgoyMDI2MDMyMy4xIKXMDSoASAFQAw%3D%3D",
            mapa_salon: "https://www.google.com/maps/place/Cd.+de+M%C3%A9xico/@19.3202008,-99.4822761,10z/data=!3m1!4b1!4m6!3m5!1s0x85ce0036b1352927:0xdefd9e4ee8d18a5b!8m2!3d19.2464696!4d-99.1013498!16s%2Fg%2F1220wgqb?entry=ttu&g_ep=EgoyMDI2MDMyMy4xIKXMDSoASAFQAw%3D%3D",
            link_hospedaje: "https://migrandia.github.io/Hoteles/",
            link_regalos: "https://mesaderegalos.liverpool.com.mx/",
            whatsapp_confirmar: "https://wa.me/521234567890?text=Confirmo%20asistencia",
            
            // 5. MÚSICA (Link directo mp3)
            link_musica: "https://www.dropbox.com/scl/fi/80hypdxkg24wx6x7oael2/En-Tus-Manos-Se-or.mp3?rlkey=j4di62c9sgj4txgwbpikcngp3&raw=1",

            // 6. FOTOS (Las 4 imágenes de la invitación)
            foto_1_portada: "https://www.dropbox.com/scl/fi/9avggx6ox57b9tkq9enxc/bautizo1.png?rlkey=xe50yu0f36p6uixsddj7mqs25&raw=1",
            foto_2_familia: "https://www.dropbox.com/scl/fi/amq1vsm698rsf1daimlr6/bautizo2.png?rlkey=z2d7is02ys38pl6rd85cbmorz&raw=1",
            foto_3_evento: "https://www.dropbox.com/scl/fi/2qofgyeo5bbcuab06rg/bautizo3.png?rlkey=h1keafa8tfesl0j739kvj0w0g&raw=1",
            foto_4_final: "https://www.dropbox.com/scl/fi/7d6z0ji1ip3el5ijciae4/bautizo4.png?rlkey=5e3uypk20ipb9kge7l0kfv727&raw=1",

            // 7. COLORES PERSONALIZABLES
            color_oro: "#d4b483",
            color_fondo_claro: "#fdfaf8",
            color_texto_oscuro: "#2d2d2d"
        };
    </script>

    <title>Bautizo | Sofía Valentina</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&family=Montserrat:wght@200;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --oro: #d4b483; --blanco: #ffffff; --texto: #2d2d2d; --bloque: #fdfaf8; }
        body, html { margin: 0; padding: 0; background-color: #1a1a1a; color: var(--texto); font-family: 'Montserrat', sans-serif; overflow-x: hidden; text-align: center; scroll-behavior: smooth;}
        .invitation-container { max-width: 480px; margin: 0 auto; background-color: var(--blanco); box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        
        /* PARALLAX CORREGIDO */
        .parallax { 
            height: 70vh; min-height: 500px;
            background-attachment: fixed; background-position: center; background-size: cover; 
            position: relative; display: flex; align-items: center; justify-content: center; 
        }
        
        #img-1 { height: 100vh; }
        #img-1::after { content: ""; position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.45); z-index: 1; }
        
        h1.nombre-portada { font-family: 'Cormorant Garamond', serif; font-size: 3.5rem; color: white; z-index: 2; text-shadow: 0 2px 15px rgba(212, 180, 131, 0.9); margin: 0; font-weight: 300; }
        .bautizo-txt { font-size: 0.8rem; letter-spacing: 6px; color: white; z-index: 2; margin-bottom: 10px; font-weight: bold; }

        section { padding: 70px 20px; background: white; }
        h2.seccion { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; color: var(--texto); margin-bottom: 20px; font-weight: 600;}
        
        .details-box { background: var(--bloque); padding: 30px 20px; border-radius: 15px; border: 1px solid #eee; margin: 20px 0; }
        .time-box { font-size: 2.6rem; color: var(--oro); font-family: 'Cormorant Garamond', serif; margin: 5px 0; font-weight: bold; }

        .padrinos-box { background: #f9f5f0; padding: 25px; border-radius: 10px; border: 1px solid #e0d4c0; margin-top: 20px; }

        .btn-menu { display: block; padding: 15px 5px; border: 1px solid var(--oro); color: var(--oro); text-decoration: none; font-weight: bold; font-size: 0.7rem; letter-spacing: 2px; border-radius: 30px; text-transform: uppercase; margin: 10px auto; width: 80%; transition: 0.3s; }
        .btn-confirm { background: var(--oro); color: white; width: 85%; margin: 30px auto; padding: 20px; display: block; text-decoration: none; border-radius: 40px; font-weight: bold; letter-spacing: 2px; box-shadow: 0 4px 15px rgba(212,180,131,0.4); }

        #music-btn { position: fixed; bottom: 20px; right: 20px; z-index: 1000; width: 50px; height: 50px; background: var(--oro); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid white; cursor: pointer; }
    </style>
</head>
<body>

    <div id="music-btn" onclick="controlMusica()">
        <svg id="play-svg" width="24" fill="white" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <svg id="pause-svg" width="24" fill="white" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
    </div>
    <audio id="track" loop><source id="audio-src" src="" type="audio/mpeg"></audio>

    <div class="invitation-container">
        
        <div id="img-1" class="parallax">
            <div style="z-index: 2;">
                <p class="bautizo-txt">EL BAUTIZO DE</p>
                <h1 id="baby-name" class="nombre-portada"></h1>
            </div>
        </div>

        <section>
            <span style="font-size: 2.5rem; color: var(--oro);">†</span>
            <p id="frase" style="font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.5rem; color: #555;"></p>
            <h2 class="seccion" style="margin-top: 30px;">¡Están Invitados!</h2>
            <p id="txt-invita"></p>
        </section>

        <div id="img-2" class="parallax"></div>

        <section style="background: var(--bloque);">
            <h2 class="seccion">Nuestra Familia</h2>
            <p style="font-size: 0.7rem; letter-spacing: 2px; color: #888;">MIS PADRES</p>
            <p id="p-names" style="font-size: 1.3rem; margin-top: 5px;"></p>
            
            <div class="padrinos-box">
                <p style="font-size: 0.7rem; letter-spacing: 2px; color: var(--oro); font-weight: bold; margin: 0;">MIS PADRINOS</p>
                <p id="g-names" style="font-size: 1.5rem; font-family: 'Cormorant Garamond', serif; font-weight: 600; margin-top: 10px;"></p>
            </div>
        </section>

        <div id="img-3" class="parallax"></div>

        <section>
            <h2 class="seccion">¿Dónde y Cuándo?</h2>
            <div class="details-box">
                <p style="color: var(--oro); font-weight: bold; letter-spacing: 2px;">⛪ CEREMONIA</p>
                <p id="iglesia" style="font-weight: bold; margin-top: 10px;"></p>
                <div id="hora-i" class="time-box"></div>
                <p id="fecha-i" style="margin-bottom: 15px; font-weight: bold;"></p>
                <a id="mapa-i" href="#" target="_blank" class="btn-menu">VER UBICACIÓN</a>
            </div>
            
            <div class="details-box">
                <p style="color: var(--oro); font-weight: bold; letter-spacing: 2px;">🎉 RECEPCIÓN</p>
                <p id="salon" style="font-weight: bold; margin-top: 10px;"></p>
                <div id="hora-s" class="time-box"></div>
                <p>Al terminar la ceremonia</p>
                <a id="mapa-s" href="#" target="_blank" class="btn-menu">VER UBICACIÓN</a>
            </div>
        </section>

        <div id="img-4" class="parallax"></div>

        <section>
            <h2 class="seccion">Detalles</h2>
            <div style="display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;">
                <a id="btn-hotel" href="#" class="btn-menu" style="width: 42%;">🏨 HOSPEDAJE</a>
                <a id="btn-gifts" href="#" target="_blank" class="btn-menu" style="width: 42%;">🎁 REGALOS</a>
            </div>
            <a id="btn-wa" href="#" target="_blank" class="btn-confirm">📲 CONFIRMAR ASISTENCIA</a>
            <p id="footer-name" style="margin-top: 50px; font-family: 'Cormorant Garamond'; font-size: 2.2rem; color: var(--oro);"></p>
        </section>
    </div>

    <script>
        // APLICAR CONFIGURACIÓN DINÁMICA
        document.getElementById('baby-name').innerText = CONFIG.nombre_bebe;
        document.getElementById('footer-name').innerText = CONFIG.nombre_bebe;
        document.getElementById('frase').innerText = CONFIG.frase_biblica;
        document.getElementById('txt-invita').innerText = CONFIG.texto_invitacion;
        document.getElementById('p-names').innerText = CONFIG.papas;
        document.getElementById('g-names').innerText = CONFIG.padrinos;
        document.getElementById('iglesia').innerText = CONFIG.iglesia_nombre;
        document.getElementById('hora-i').innerText = CONFIG.iglesia_hora;
        document.getElementById('fecha-i').innerText = CONFIG.iglesia_fecha;
        document.getElementById('mapa-i').href = CONFIG.mapa_iglesia;
        document.getElementById('salon').innerText = CONFIG.salon_nombre;
        document.getElementById('hora-s').innerText = CONFIG.salon_hora;
        document.getElementById('mapa-s').href = CONFIG.mapa_salon;
        document.getElementById('btn-hotel').href = CONFIG.link_hospedaje;
        document.getElementById('btn-gifts').href = CONFIG.link_regalos;
        document.getElementById('btn-wa').href = CONFIG.whatsapp_confirmar;
        document.getElementById('audio-src').src = CONFIG.link_musica;
        document.getElementById('track').load();

        // Aplicar Fotos
        document.getElementById('img-1').style.backgroundImage = `url('${CONFIG.foto_1_portada}')`;
        document.getElementById('img-2').style.backgroundImage = `url('${CONFIG.foto_2_familia}')`;
        document.getElementById('img-3').style.backgroundImage = `url('${CONFIG.foto_3_evento}')`;
        document.getElementById('img-4').style.backgroundImage = `url('${CONFIG.foto_4_final}')`;

        // Colores
        document.documentElement.style.setProperty('--oro', CONFIG.color_oro);
        document.documentElement.style.setProperty('--bloque', CONFIG.color_fondo_claro);
        document.documentElement.style.setProperty('--texto', CONFIG.color_texto_oscuro);

        const t = document.getElementById('track');
        function controlMusica() {
            if (t.paused) { t.play(); document.getElementById('play-svg').style.display='none'; document.getElementById('pause-svg').style.display='block'; }
            else { t.pause(); document.getElementById('play-svg').style.display='block'; document.getElementById('pause-svg').style.display='none'; }
        }
        document.addEventListener('click', () => { if(t.paused) controlMusica(); }, {once: true});
    </script>
</body>
</html>
